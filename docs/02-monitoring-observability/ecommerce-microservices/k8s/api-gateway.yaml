# ──────────────────────────────────────────────────────────────────────────────
# api-gateway — Routes external traffic to all downstream services
# Namespace: set via -n flag or kustomize overlay (dev / test)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    team: platform
    monitor: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        team: platform
      annotations:
        # These 3 annotations are all Prometheus needs to auto-discover this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: api-gateway
          image: REGISTRY_PLACEHOLDER/ecommerce/api-gateway:v1.0   # updated by build script
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "api-gateway"
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace   # automatically picks "dev" or "test"
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    monitor: "true"   # ServiceMonitor selector uses this label
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP


