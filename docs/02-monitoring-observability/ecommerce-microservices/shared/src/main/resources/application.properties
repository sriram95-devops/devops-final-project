# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Service identity (overridden by Kubernetes env vars) ─────────────────────
# DevOps sets SERVICE_NAME and APP_ENV in the Deployment manifest
app.service-name=${SERVICE_NAME:unknown-service}
app.env=${APP_ENV:dev}

# ── Spring Actuator ───────────────────────────────────────────────────────────
# Expose health and prometheus endpoints
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# Metrics: add service and env as common tags on every metric
management.metrics.tags.service=${SERVICE_NAME:unknown-service}
management.metrics.tags.env=${APP_ENV:dev}

# ── Tracing (Jaeger via OTLP) ────────────────────────────────────────────────
# Send 100% of traces to Jaeger (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0

# OTLP endpoint — Jaeger service in observability namespace
management.otlp.tracing.endpoint=http://jaeger.observability.svc.cluster.local:4318/v1/traces

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG
# Include trace ID and span ID in every log line
logging.pattern.correlation=[%X{traceId}/%X{spanId}]

# ── Application info (shown in /actuator/info) ────────────────────────────────
info.app.name=${SERVICE_NAME:unknown-service}
info.app.env=${APP_ENV:dev}
info.app.java-version=@java.version@
